<!DOCTYPE html>
<html>
<head>
    <title>ChatKit Test</title>
</head>
<body>
    <h1>ChatKit Test</h1>
    <div id="status"></div>
    <div id="messages"></div>
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
    
    <script>
        let sessionData = null;
        
        async function initSession() {
            try {
                const response = await fetch('http://localhost:5000/api/chatkit/create-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: 'test-browser-user' })
                });
                
                sessionData = await response.json();
                document.getElementById('status').innerHTML = `Session created! Thread: ${sessionData.thread_id}`;
                console.log('Session:', sessionData);
            } catch (error) {
                document.getElementById('status').innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function sendMessage() {
            if (!sessionData) {
                alert('Please wait for session initialization');
                return;
            }
            
            const message = document.getElementById('messageInput').value;
            if (!message) return;
            
            document.getElementById('messages').innerHTML += `<p><b>You:</b> ${message}</p>`;
            document.getElementById('messageInput').value = '';
            
            try {
                const response = await fetch('http://localhost:5000/api/chatkit/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${sessionData.client_secret}`
                    },
                    body: JSON.stringify({
                        message: message,
                        thread_id: sessionData.thread_id
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMessage = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    console.log('Received chunk:', chunk);
                    
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.type === 'delta') {
                                    assistantMessage += data.content;
                                    document.getElementById('messages').innerHTML = 
                                        document.getElementById('messages').innerHTML.replace(
                                            /<p id="assistant">.*<\/p>$/,
                                            ''
                                        ) + `<p id="assistant"><b>Assistant:</b> ${assistantMessage}</p>`;
                                } else if (data.type === 'done') {
                                    console.log('Stream completed');
                                }
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                document.getElementById('messages').innerHTML += `<p><b>Error:</b> ${error.message}</p>`;
            }
        }
        
        // Initialize on load
        initSession();
    </script>
</body>
</html>
