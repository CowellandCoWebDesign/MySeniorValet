<style id="themeCSS"></style><style id="customCSS">.forceCommunityGlobalSearchInput {
   visibility: hidden
}
h1, h2, h3, h4, h5, h6 {
    font-family: Work Sans;
}
.cHeaderWrapper > div:first-child {
    margin: 0 auto;
    max-width: 1440px;
    padding: 1em 2em 0;
}
.siteforcePrmBody .cHeaderWrapper > .cHeader {
    margin-top: -50px;
}
.siteforcePrmBody .cHeaderWrapper > .cHeader .cHeaderTop {
    height: 70px;
}
.cHeaderWrapper .forceCommunityRichText h1,
.cHeaderWrapper .forceCommunityRichText h1 span {
    display: block;
    font-family: Work Sans;
    font-size: 1.5rem;
    font-weight: bold;
}
@media screen and (max-width: 768px) {
    .cHeaderWrapper > div:first-child {
    	padding: 1em 1em 0;
    }
    .siteforcePrmBody .cHeaderWrapper > .cHeader {
        margin-top: 0;
    }
	.siteforcePrmBody .cHeaderWrapper > .cHeader .cHeaderTop {
        height: auto;
    }
    
}
@media only screen and (max-width: 47.9375em) {
    .siteforcePrmBody .cCenterPanel {
        margin-top: 3rem !important;
    }
}

@page {
    margin: .5in;
}
@media print{
    .cHeaderWrapper {
        display: none
    }
    .forceCommunityRichText{
        display: none
    }
    
    
    .print-hide{
        display: none;
    }
    
    .siteforcePrmBody .cCenterPanel {
        padding: 0px !important;
    }
    .slds-docked-form-footer {
        display: none;
    }
    button {
        display: none !important;
    }

    .ui-magic-button-root {
        display: none;
    }   
    .slds-docked-form-footer {
        display: none;
    }
    .read-only {
        padding: 3px !important;
        margin-bottom: -11px !important;
    }

    abbr {
        display: none !important;
    }

    .slds-card {
        border: 0;
        border-bottom: 1px solid #d4d4d4
    }
    .slds-card__header {
        padding: .75rem 0 0;
        margin: 0 0 .75rem;
        font-weight: 700;
    }
    .slds-input {
        padding: 0;
    }
    .slds-form-element__label {
        display: inline-block;
        width: 250px;
    }
    .slds-form-element__control {
        border: 1px;
        display: inline-block;
    }

}
.slds-button,
.slds-text-link {
    color: #135f90;
    font-weight: bold;
}
.slds-button_brand, .slds-button--brand {
    color: #ffffff;
}
.slds-button:hover, .slds-button:focus {
    text-decoration: underline;
}
.myAccount{
  display:none;  
}
.profile.uiMenuItem{
