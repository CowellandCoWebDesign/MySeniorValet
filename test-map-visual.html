<!DOCTYPE html>
<html>
<head>
    <title>Map Clustering Visual Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-container { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .test-result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
        .success { background: #d4edda; color: #155724; }
        .failure { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .zoom-test { margin: 10px 0; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #results { margin-top: 20px; }
        .cluster-info { background: #fff3cd; padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Map Clustering Visual Test</h1>
    
    <div class="test-container">
        <h2>Test Different Zoom Levels</h2>
        <p>Click buttons to test clustering at different zoom levels:</p>
        
        <div class="zoom-test">
            <button onclick="testZoom(10)">Test Zoom 10 (Country)</button>
            <button onclick="testZoom(12)">Test Zoom 12 (City)</button>
            <button onclick="testZoom(13)">Test Zoom 13 (Neighborhood)</button>
            <button onclick="testZoom(14)">Test Zoom 14 (Street)</button>
            <button onclick="testZoom(17)">Test Zoom 17 (Building)</button>
        </div>
        
        <div class="zoom-test">
            <button onclick="simulateZoomIn()">Simulate Zoom In (12→13→14)</button>
            <button onclick="simulateZoomOut()">Simulate Zoom Out (14→13→12)</button>
        </div>
    </div>
    
    <div id="results"></div>
    
    <script>
        const BASE_URL = 'http://localhost:5000';
        const SF_BOUNDS = {
            west: -122.43,
            south: 37.76,
            east: -122.40,
            north: 37.79
        };
        
        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            results.insertBefore(div, results.firstChild);
        }
        
        async function testZoom(zoom) {
            addResult(`Testing zoom level ${zoom}...`, 'info');
            
            try {
                const url = `${BASE_URL}/api/communities/clusters?west=${SF_BOUNDS.west}&south=${SF_BOUNDS.south}&east=${SF_BOUNDS.east}&north=${SF_BOUNDS.north}&zoom=${zoom}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (!data.clusters) {
                    addResult(`Zoom ${zoom}: No clusters data returned`, 'failure');
                    return;
                }
                
                const clusters = data.clusters.filter(f => f.properties?.cluster);
                const markers = data.clusters.filter(f => !f.properties?.cluster);
                
                let message = `<strong>Zoom ${zoom} Results:</strong><br>`;
                message += `Total features: ${data.clusters.length}<br>`;
                message += `Clusters: ${clusters.length} (grouped communities)<br>`;
                message += `Individual markers: ${markers.length}<br>`;
                
                if (zoom <= 12 && clusters.length === 0) {
                    message += '<br><span style="color: red;">⚠️ Expected clusters at this zoom level!</span>';
                } else if (zoom >= 13 && clusters.length > markers.length) {
                    message += '<br><span style="color: red;">⚠️ Expected more individual markers at this zoom level!</span>';
                }
                
                addResult(message, 'cluster-info');
                
                // Show first few clusters for debugging
                if (clusters.length > 0) {
                    addResult(`First cluster: ${clusters[0].properties.point_count} communities grouped together`, 'info');
                }
                
            } catch (error) {
                addResult(`Error testing zoom ${zoom}: ${error.message}`, 'failure');
            }
        }
        
        async function simulateZoomIn() {
            addResult('Simulating zoom in sequence...', 'info');
            await testZoom(12);
            await new Promise(r => setTimeout(r, 1000));
            await testZoom(13);
            await new Promise(r => setTimeout(r, 1000));
            await testZoom(14);
            addResult('Zoom in sequence complete', 'success');
        }
        
        async function simulateZoomOut() {
            addResult('Simulating zoom out sequence...', 'info');
            await testZoom(14);
            await new Promise(r => setTimeout(r, 1000));
            await testZoom(13);
            await new Promise(r => setTimeout(r, 1000));
            await testZoom(12);
            addResult('Zoom out sequence complete', 'success');
        }
        
        // Run initial test
        window.onload = () => {
            addResult('Visual test page loaded. Click buttons to test clustering.', 'success');
            testZoom(12); // Start with city view
        };
    </script>
</body>
</html>
