<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Space Background -->
  <defs>
    <radialGradient id="spaceGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1a0b2e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a2e;stop-opacity:1" />
    </radialGradient>
    
    <!-- Purple Cosmic Clouds -->
    <radialGradient id="cloudGradient1" cx="30%" cy="70%" r="60%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.1" />
    </radialGradient>
    
    <radialGradient id="cloudGradient2" cx="70%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#be185d;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#9d174d;stop-opacity:0.1" />
    </radialGradient>
    
    <radialGradient id="cloudGradient3" cx="80%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#1d4ed8;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  
  <!-- Space Background -->
  <rect width="1920" height="1080" fill="url(#spaceGradient)"/>
  
  <!-- Cosmic Cloud Layers -->
  <ellipse cx="500" cy="800" rx="600" ry="300" fill="url(#cloudGradient1)" opacity="0.6"/>
  <ellipse cx="1400" cy="200" rx="500" ry="400" fill="url(#cloudGradient2)" opacity="0.5"/>
  <ellipse cx="1600" cy="900" rx="400" ry="250" fill="url(#cloudGradient3)" opacity="0.4"/>
  
  <!-- Scattered Stars -->
  <g fill="white" opacity="0.8">
    <circle cx="100" cy="100" r="1"/>
    <circle cx="300" cy="80" r="1.5"/>
    <circle cx="500" cy="150" r="1"/>
    <circle cx="700" cy="120" r="2"/>
    <circle cx="900" cy="90" r="1"/>
    <circle cx="1100" cy="140" r="1.5"/>
    <circle cx="1300" cy="110" r="1"/>
    <circle cx="1500" cy="180" r="2"/>
    <circle cx="1700" cy="160" r="1"/>
    <circle cx="1850" cy="200" r="1.5"/>
    <circle cx="150" cy="300" r="1"/>
    <circle cx="350" cy="320" r="1.5"/>
    <circle cx="550" cy="280" r="1"/>
    <circle cx="750" cy="350" r="2"/>
    <circle cx="950" cy="310" r="1"/>
    <circle cx="1150" cy="340" r="1.5"/>
    <circle cx="1350" cy="380" r="1"/>
    <circle cx="1550" cy="320" r="2"/>
    <circle cx="1750" cy="360" r="1"/>
    <circle cx="1880" cy="400" r="1.5"/>
    <circle cx="80" cy="500" r="1"/>
    <circle cx="280" cy="520" r="1.5"/>
    <circle cx="480" cy="480" r="1"/>
    <circle cx="680" cy="550" r="2"/>
    <circle cx="880" cy="510" r="1"/>
    <circle cx="1080" cy="540" r="1.5"/>
    <circle cx="1280" cy="580" r="1"/>
    <circle cx="1480" cy="520" r="2"/>
    <circle cx="1680" cy="560" r="1"/>
    <circle cx="1820" cy="600" r="1.5"/>
    <circle cx="120" cy="700" r="1"/>
    <circle cx="320" cy="720" r="1.5"/>
    <circle cx="520" cy="680" r="1"/>
    <circle cx="720" cy="750" r="2"/>
    <circle cx="920" cy="710" r="1"/>
    <circle cx="1120" cy="740" r="1.5"/>
    <circle cx="1320" cy="780" r="1"/>
    <circle cx="1520" cy="720" r="2"/>
    <circle cx="1720" cy="760" r="1"/>
    <circle cx="1860" cy="800" r="1.5"/>
    <circle cx="180" cy="900" r="1"/>
    <circle cx="380" cy="920" r="1.5"/>
    <circle cx="580" cy="880" r="1"/>
    <circle cx="780" cy="950" r="2"/>
    <circle cx="980" cy="910" r="1"/>
    <circle cx="1180" cy="940" r="1.5"/>
    <circle cx="1380" cy="980" r="1"/>
    <circle cx="1580" cy="920" r="2"/>
    <circle cx="1780" cy="960" r="1"/>
    <circle cx="1900" cy="1000" r="1.5"/>
  </g>
  
  <!-- Twinkling Stars (larger, more prominent) -->
  <g fill="#fbbf24" opacity="0.9">
    <circle cx="200" cy="200" r="3"/>
    <circle cx="600" cy="300" r="2.5"/>
    <circle cx="1000" cy="450" r="3"/>
    <circle cx="1400" cy="600" r="2.5"/>
    <circle cx="1800" cy="300" r="3"/>
    <circle cx="400" cy="700" r="2.5"/>
    <circle cx="800" cy="150" r="3"/>
    <circle cx="1200" cy="850" r="2.5"/>
    <circle cx="1600" cy="400" r="3"/>
    <circle cx="300" cy="950" r="2.5"/>
  </g>
  
  <!-- FALLEN RETAIL GIANTS FLOATING THROUGH SPACE -->
  
  <!-- RadioShack (1974-1995 Circular R Logo) -->
  <g transform="translate(150, 250) rotate(-15)">
    <circle cx="0" cy="0" r="45" fill="#ff6b00" stroke="#fff" stroke-width="3"/>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="Arial Black" font-size="48" font-weight="bold">R</text>
    <text x="0" y="65" text-anchor="middle" fill="#ff6b00" font-family="Arial" font-size="12" font-weight="bold">RadioShack</text>
  </g>
  
  <!-- Blockbuster (Blue/Yellow Ticket Design) -->
  <g transform="translate(400, 180) rotate(10)">
    <rect x="-50" y="-25" width="100" height="50" fill="#003f7f" stroke="#ffd700" stroke-width="3" rx="5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#ffd700" font-family="Arial Black" font-size="14" font-weight="bold">BLOCKBUSTER</text>
    <text x="0" y="10" text-anchor="middle" fill="#ffd700" font-family="Arial" font-size="8">VIDEO</text>
    <text x="0" y="55" text-anchor="middle" fill="#003f7f" font-family="Arial" font-size="12" font-weight="bold">Blockbuster</text>
  </g>
  
  <!-- Toys"R"Us (Geoffrey Giraffe Era) -->
  <g transform="translate(700, 320) rotate(-20)">
    <rect x="-55" y="-30" width="110" height="60" fill="#ff0000" stroke="#fff" stroke-width="3" rx="8"/>
    <text x="0" y="-8" text-anchor="middle" fill="white" font-family="Arial Black" font-size="16" font-weight="bold">TOYS"R"US</text>
    <text x="0" y="8" text-anchor="middle" fill="#ffd700" font-family="Arial" font-size="10">🦒 Geoffrey</text>
    <text x="0" y="65" text-anchor="middle" fill="#ff0000" font-family="Arial" font-size="12" font-weight="bold">Toys"R"Us</text>
  </g>
  
  <!-- Circuit City (Red Tag) -->
  <g transform="translate(950, 200) rotate(25)">
    <rect x="-50" y="-20" width="100" height="40" fill="#cc0000" stroke="#fff" stroke-width="2" rx="3"/>
    <text x="0" y="-3" text-anchor="middle" fill="white" font-family="Arial Black" font-size="12" font-weight="bold">CIRCUIT</text>
    <text x="0" y="12" text-anchor="middle" fill="white" font-family="Arial Black" font-size="12" font-weight="bold">CITY</text>
    <text x="0" y="50" text-anchor="middle" fill="#cc0000" font-family="Arial" font-size="12" font-weight="bold">Circuit City</text>
  </g>
  
  <!-- Sears Roebuck & Co -->
  <g transform="translate(1200, 400) rotate(-10)">
    <ellipse cx="0" cy="0" rx="50" ry="30" fill="#8b4513" stroke="#ffd700" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" fill="#ffd700" font-family="Times" font-size="16" font-weight="bold">SEARS</text>
    <text x="0" y="8" text-anchor="middle" fill="#ffd700" font-family="Times" font-size="8">ROEBUCK &amp; CO.</text>
    <text x="0" y="55" text-anchor="middle" fill="#8b4513" font-family="Arial" font-size="12" font-weight="bold">Sears</text>
  </g>
  
  <!-- Kmart -->
  <g transform="translate(1500, 280) rotate(15)">
    <rect x="-45" y="-25" width="90" height="50" fill="#006ba6" stroke="#fff" stroke-width="3" rx="5"/>
    <text x="0" y="0" text-anchor="middle" fill="white" font-family="Arial Black" font-size="20" font-weight="bold">Kmart</text>
    <text x="0" y="55" text-anchor="middle" fill="#006ba6" font-family="Arial" font-size="12" font-weight="bold">Kmart</text>
  </g>
  
  <!-- CompUSA -->
  <g transform="translate(250, 500) rotate(-25)">
    <rect x="-50" y="-20" width="100" height="40" fill="#000080" stroke="#00ff00" stroke-width="2" rx="3"/>
    <text x="0" y="-3" text-anchor="middle" fill="#00ff00" font-family="Arial Black" font-size="12" font-weight="bold">CompUSA</text>
    <text x="0" y="10" text-anchor="middle" fill="#00ff00" font-family="Arial" font-size="8">Computer Superstore</text>
    <text x="0" y="50" text-anchor="middle" fill="#000080" font-family="Arial" font-size="12" font-weight="bold">CompUSA</text>
  </g>
  
  <!-- Borders Books -->
  <g transform="translate(500, 650) rotate(20)">
    <rect x="-45" y="-25" width="90" height="50" fill="#8b4513" stroke="#f4e4bc" stroke-width="3" rx="5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#f4e4bc" font-family="Times" font-size="14" font-weight="bold">BORDERS</text>
    <text x="0" y="8" text-anchor="middle" fill="#f4e4bc" font-family="Times" font-size="8">Books &amp; Music</text>
    <text x="0" y="55" text-anchor="middle" fill="#8b4513" font-family="Arial" font-size="12" font-weight="bold">Borders</text>
  </g>
  
  <!-- KB Toys -->
  <g transform="translate(800, 750) rotate(-30)">
    <circle cx="0" cy="0" r="35" fill="#ff69b4" stroke="#fff" stroke-width="3"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="Arial Black" font-size="14" font-weight="bold">KB</text>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="Arial Black" font-size="10">TOYS</text>
    <text x="0" y="55" text-anchor="middle" fill="#ff69b4" font-family="Arial" font-size="12" font-weight="bold">KB Toys</text>
  </g>
  
  <!-- FuncoLand -->
  <g transform="translate(1100, 680) rotate(12)">
    <rect x="-50" y="-20" width="100" height="40" fill="#9932cc" stroke="#ffd700" stroke-width="2" rx="8"/>
    <text x="0" y="-3" text-anchor="middle" fill="#ffd700" font-family="Arial Black" font-size="12" font-weight="bold">FuncoLand</text>
    <text x="0" y="10" text-anchor="middle" fill="#ffd700" font-family="Arial" font-size="8">Video Games</text>
    <text x="0" y="50" text-anchor="middle" fill="#9932cc" font-family="Arial" font-size="12" font-weight="bold">FuncoLand</text>
  </g>
  
  <!-- Tower Records -->
  <g transform="translate(1400, 780) rotate(-18)">
    <rect x="-50" y="-25" width="100" height="50" fill="#ff4500" stroke="#000" stroke-width="3" rx="3"/>
    <text x="0" y="-8" text-anchor="middle" fill="black" font-family="Arial Black" font-size="12" font-weight="bold">TOWER</text>
    <text x="0" y="5" text-anchor="middle" fill="black" font-family="Arial Black" font-size="12" font-weight="bold">RECORDS</text>
    <text x="0" y="55" text-anchor="middle" fill="#ff4500" font-family="Arial" font-size="12" font-weight="bold">Tower Records</text>
  </g>
  
  <!-- Musicland -->
  <g transform="translate(1650, 600) rotate(22)">
    <ellipse cx="0" cy="0" rx="45" ry="25" fill="#4b0082" stroke="#dda0dd" stroke-width="3"/>
    <text x="0" y="-3" text-anchor="middle" fill="#dda0dd" font-family="Arial Black" font-size="12" font-weight="bold">Musicland</text>
    <text x="0" y="55" text-anchor="middle" fill="#4b0082" font-family="Arial" font-size="12" font-weight="bold">Musicland</text>
  </g>
  
  <!-- The Wiz -->
  <g transform="translate(350, 800) rotate(-8)">
    <rect x="-40" y="-20" width="80" height="40" fill="#ffd700" stroke="#8b0000" stroke-width="3" rx="5"/>
    <text x="0" y="-3" text-anchor="middle" fill="#8b0000" font-family="Arial Black" font-size="14" font-weight="bold">The Wiz</text>
    <text x="0" y="10" text-anchor="middle" fill="#8b0000" font-family="Arial" font-size="8">Electronics</text>
    <text x="0" y="50" text-anchor="middle" fill="#ffd700" font-family="Arial" font-size="12" font-weight="bold">The Wiz</text>
  </g>
  
  <!-- OfficeMax -->
  <g transform="translate(900, 550) rotate(18)">
    <rect x="-50" y="-20" width="100" height="40" fill="#0066cc" stroke="#fff" stroke-width="2" rx="3"/>
    <text x="0" y="-3" text-anchor="middle" fill="white" font-family="Arial Black" font-size="12" font-weight="bold">OfficeMax</text>
    <text x="0" y="50" text-anchor="middle" fill="#0066cc" font-family="Arial" font-size="12" font-weight="bold">OfficeMax</text>
  </g>
  
  <!-- Service Merchandise -->
  <g transform="translate(1250, 150) rotate(-35)">
    <rect x="-55" y="-15" width="110" height="30" fill="#228b22" stroke="#fff" stroke-width="2" rx="5"/>
    <text x="0" y="0" text-anchor="middle" fill="white" font-family="Arial Black" font-size="10" font-weight="bold">SERVICE MERCHANDISE</text>
    <text x="0" y="45" text-anchor="middle" fill="#228b22" font-family="Arial" font-size="10" font-weight="bold">Service Merchandise</text>
  </g>
  
  <!-- Additional Cosmic Effects -->
  <g opacity="0.3">
    <!-- Nebula wisps -->
    <path d="M100,600 Q300,500 500,700 Q700,800 900,600" stroke="#8b5cf6" stroke-width="8" fill="none" opacity="0.4"/>
    <path d="M1000,300 Q1200,200 1400,400 Q1600,500 1800,300" stroke="#ec4899" stroke-width="6" fill="none" opacity="0.3"/>
    <path d="M200,900 Q600,850 1000,950 Q1400,1000 1700,900" stroke="#3b82f6" stroke-width="10" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Distant Galaxies -->
  <g opacity="0.6">
    <ellipse cx="1750" cy="150" rx="30" ry="8" fill="#fbbf24" opacity="0.4" transform="rotate(45 1750 150)"/>
    <ellipse cx="100" cy="950" rx="25" ry="6" fill="#8b5cf6" opacity="0.4" transform="rotate(-30 100 950)"/>
    <ellipse cx="1850" cy="950" rx="35" ry="10" fill="#ec4899" opacity="0.4" transform="rotate(60 1850 950)"/>
  </g>
  
  <!-- Final atmospheric glow -->
  <rect width="1920" height="1080" fill="url(#spaceGradient)" opacity="0.1"/>
</svg>